# ==========================
# CI Using GitHub Cache
# ==========================
name: CI Using GitHub Cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment name'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stage
          - prod
      dbHost:
        type: string
        description: 'Database host address'
        required: true
        default: 'localhost'
      dbPort:
        type: string
        description: 'Database host port number, i.e. MySQL 3306, PostgreSQL 5432'
        required: true
      dbType:
        description: 'Database type (MySQL/PostgreSQL)'
        required: true
        default: 'postgresql'
        type: choice
        options:
          - postgresql
          - mysql

env:
  MAVEN_VERSION: maven:3.8.4-openjdk-17
  FLYWAY_VERSION: 9.16.3
  DB_NAME: 'corebankdb'

jobs:
  build:
    runs-on: ubuntu-latest
    # Service containers to run with `container-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_USER: ${{ secrets.USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flyway
        run: |
          wget -qO- https://download.red-gate.com/maven/release/org/flywaydb/enterprise/flyway-commandline/${{ env.FLYWAY_VERSION }}/flyway-commandline-${{ env.FLYWAY_VERSION }}-linux-x64.tar.gz | tar -xvz && sudo ln -s `pwd`/flyway-${{ env.FLYWAY_VERSION }}/flyway /usr/local/bin 

      - name: Run Flyway Migrations
        env:
          FLYWAY_URL: 'jdbc:postgresql://localhost:5432/corebankdb'
          FLYWAY_USER: 'postgres'
          FLYWAY_PASSWORD: 'corebankpw'
          FLYWAY_SCHEMAS: flyway,public
        run: |
          flyway migrate
          flyway info

      - name: Checkout code
        uses: actions/checkout@v4.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v4.0.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check Java version
        run: java -version

      - name: Cache Maven packages
        uses: actions/cache@v4
        id: cache
        with:
          path: ~/.m2/repository
          #Using GitHub Actions syntax to cache the maven packages
          # ${{ runner.os }} resolves to the operating system of the runner, such as:
          #Linux
          #Windows
          #macOS
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      # If the cache was found, steps.cache.outputs.cache-hit will usually be "true".
      #If the cache was not found, it will be "false" or empty depending on the situation.
      - name: Cache Status
        run: |
          echo "Cache Status:" 
          if [ "${{ steps.cache.outputs.cache-hit }}" == "true" ]; then 
            echo " Cache hit" 
          else 
            echo "Cache miss" 
          fi

      - name: Install Dependencies
        run: mvn install -DskipTests=true -Dmaven.javadoc.skip=true -B -V

      - name: Run Tests
        run: mvn test

      - name: Build with Maven
        run: mvn package -B -V
